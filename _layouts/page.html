---
layout: default
---
<article class="page-shell{% if page.page_class %} {{ page.page_class }}{% endif %}">
    <header class="page-header">
        <p class="eyebrow">{{ page.eyebrow | default: site.title }}</p>
        <h1>{{ page.title }}</h1>
        {% if page.description %}
            <p>{{ page.description }}</p>
        {% endif %}
    </header>
    <section class="page-content" aria-label="{{ page.title }} content">
        {{ content }}
    </section>
</article>
